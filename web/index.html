<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shogi - MCTS</title>
<style>
  html, body {
    margin: 0; height: 100%; background: #1a1b20; color: #cfcfd4;
    font-family: system-ui, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  canvas {
    background: #000; border: 1px solid #333;
    width: 1024px; max-width: 100%; height: auto; outline: none;
  }
  #status { padding: 10px; font-size: 14px; color: #7f7f88; }
</style>
</head>
<body>
<!-- The width/height attributes give the canvas an intrinsic size; without
     them the flex layout collapses it and SDL locks onto a tiny render
     target.  They must match WIN_W/WIN_H in src/ui.cpp. -->
<canvas id="canvas" width="1024" height="720"
        tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
<div id="status">loading...</div>

<!-- Tries to cross-origin-isolate the page (via a service worker) so the
     multi-threaded build can use SharedArrayBuffer.  On the first visit this
     registers the worker and reloads once.  Harmless where it cannot help. -->
<script src="enable-threads.js"></script>

<script>
  var statusEl = document.getElementById('status');
  var Module = {
    canvas: document.getElementById('canvas'),
    setStatus: function (t) { statusEl.textContent = t; },
    print: function (t) { console.log(t); },
    printErr: function (t) { console.error(t); },
    onRuntimeInitialized: function () { statusEl.textContent = ''; },
  };

  // Load the multi-threaded build when the browser gives us a cross-origin
  // isolated context (SharedArrayBuffer); otherwise the single-threaded one.
  function loadBuild() {
    var threaded = (self.crossOriginIsolated === true) &&
                   (typeof SharedArrayBuffer !== 'undefined');
    statusEl.textContent =
      'loading (' + (threaded ? 'multi-threaded' : 'single-threaded') + ')...';
    var s = document.createElement('script');
    s.src = threaded ? 'shogi-mt.js' : 'shogi-st.js';
    document.body.appendChild(s);
  }

  if (!self.crossOriginIsolated && 'serviceWorker' in navigator &&
      !navigator.serviceWorker.controller) {
    // enable-threads.js is probably about to reload the page; wait for that
    // rather than load the single-threaded build now.  If no reload happens
    // (service worker unavailable/blocked), fall back after a short delay.
    statusEl.textContent = 'enabling multi-threading...';
    setTimeout(loadBuild, 3000);
  } else {
    loadBuild();
  }
</script>
</body>
</html>
