<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shogi - MCTS</title>
<style>
  html, body {
    margin: 0; height: 100%; background: #1a1b20; color: #cfcfd4;
    font-family: system-ui, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  canvas {
    background: #000; border: 1px solid #333;
    max-width: 100%; height: auto; outline: none;
  }
  #status { padding: 10px; font-size: 14px; color: #7f7f88; }
</style>
</head>
<body>
<canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
<div id="status">loading...</div>
<script>
  var statusEl = document.getElementById('status');
  var Module = {
    canvas: document.getElementById('canvas'),
    setStatus: function (text) { statusEl.textContent = text; },
    print: function (text) { console.log(text); },
    printErr: function (text) { console.error(text); },
    onRuntimeInitialized: function () { statusEl.textContent = ''; },
  };
</script>
{{{ SCRIPT }}}
</body>
</html>
